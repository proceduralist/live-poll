<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live Poll — My Results</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="poll-common.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex;
    flex-direction: column; align-items: center; padding: 28px 16px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #94a3b8; font-size: 14px; margin-bottom: 22px; text-align: center; }
  .sub a { color: #38bdf8; text-decoration: none; }
  #login { width: 100%; max-width: 420px; background: #1e293b; border-radius: 12px; padding: 16px; }
  #login input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px;
    border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 15px; }
  #login button { padding: 9px 14px; margin-right: 8px; border: none; border-radius: 8px;
    background: #0284c7; color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
  #loginMsg { font-size: 13px; color: #f87171; margin-top: 6px; min-height: 18px; }
  .sessionCard { width: 100%; max-width: 560px; background: #1e293b; border: 1px solid #334155;
    border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .sessionCard h2 { font-size: 17px; margin-bottom: 2px; }
  .sessionCard .code { font-size: 11px; color: #38bdf8; letter-spacing: 1px; text-transform: uppercase; }
  .score { font-size: 13px; color: #94a3b8; margin: 4px 0 12px; }
  .qa { border-top: 1px solid #334155; padding: 10px 0; }
  .qa .q { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .qa .a { font-size: 14px; color: #94a3b8; line-height: 1.5; }
  .right { color: #4ade80; }
  .wrong { color: #f87171; }
  #empty { color: #64748b; font-size: 14px; text-align: center; max-width: 420px; line-height: 1.6; }
</style>
</head>
<body>
  <h1>📊 My Results</h1>
  <div class="sub" id="who">Sign in to see the questions you've answered.</div>

  <div id="login" style="display:none">
    <input id="aEmail" type="email" placeholder="email" autocomplete="username" />
    <input id="aPass" type="password" placeholder="password" autocomplete="current-password" />
    <button onclick="doSignIn()">Sign in</button>
    <button onclick="doCreate()">Create account</button>
    <div id="loginMsg"></div>
  </div>
  <div id="content"></div>

<script>
  const $ = (id) => document.getElementById(id);
  let user = null;

  async function doSignIn() {
    $("loginMsg").style.color = "#f87171";
    const { error } = await sb.auth.signInWithPassword(
      { email: $("aEmail").value.trim(), password: $("aPass").value });
    if (error) $("loginMsg").textContent = "Sign-in failed: " + error.message;
  }
  async function doCreate() {
    $("loginMsg").style.color = "#f87171";
    const { data, error } = await sb.auth.signUp(
      { email: $("aEmail").value.trim(), password: $("aPass").value });
    if (error) { $("loginMsg").textContent = "Couldn't create account: " + error.message; return; }
    if (!data.session) {
      $("loginMsg").style.color = "#4ade80";
      $("loginMsg").textContent = "Almost there — tap the link in the email we just sent, then sign in.";
    }
  }

  async function load() {
    $("content").innerHTML = "<div id='empty'>Loading…</div>";

    // Answers mirrored on this device by vote.html — fallback if we're offline.
    let local = {};
    try { local = JSON.parse(localStorage.getItem("pollAnswers_" + user.id)) || {}; } catch (e) {}

    // My answer history (RLS: each voter can only ever read their own rows).
    // Normalized to the same record shape vote.html mirrors locally.
    let remote = {}, remoteFailed = false;
    const { data: rows, error } = await sb.from("answers").select("*")
      .eq("user_id", user.id);
    if (error) remoteFailed = true;
    else for (const r of rows || []) {
      remote[r.session_code + "_" + r.slide_id] = {
        s: r.session_code, p: r.slide_id, c: r.choice, v: r.version,
        question: r.question, options: r.options,
        correct: typeof r.correct === "number" ? r.correct : null,
        n: r.session_name || null,
        t: r.answered_at ? new Date(r.answered_at).getTime() : 0
      };
    }

    const answers = Object.values(Object.assign({}, local, remote));
    if (!answers.length) {
      $("content").innerHTML = remoteFailed
        ? "<div id='empty'>Couldn't load your answer history — check your connection and reload this page.</div>"
        : "<div id='empty'>No answers yet. Scan a poll QR code, sign in on the voting page, and your answers will show up here.</div>";
      return;
    }

    // group by session, newest first
    const bySession = {};
    for (const a of answers) (bySession[a.s] = bySession[a.s] || []).push(a);
    const codes = Object.keys(bySession).sort((x, y) =>
      Math.max(...bySession[y].map(a => a.t || 0)) - Math.max(...bySession[x].map(a => a.t || 0)));

    // prefer live session data (correct answers may have been set after voting):
    // one query for all polls, one for all session names
    const livePolls = {}, liveNames = {};
    try {
      const { data } = await sb.from("polls")
        .select("session_code,slide_id,question,options,correct").in("session_code", codes);
      for (const p of data || [])
        (livePolls[p.session_code] = livePolls[p.session_code] || {})[p.slide_id] = p;
    } catch (e) {}
    try {
      const { data } = await sb.from("sessions").select("code,name").in("code", codes);
      for (const s of data || []) liveNames[s.code] = s.name;
    } catch (e) {}

    let html = "";
    for (const code of codes) {
      const live = livePolls[code] || null;
      const liveName = liveNames[code];

      const list = bySession[code].sort((x, y) => (x.t || 0) - (y.t || 0));
      let right = 0, scored = 0, rows = "";
      for (const a of list) {
        const lp = live && live[a.p];
        const question = lp ? lp.question : a.question;
        const options = lp ? lp.options : a.options;
        const correct = (lp && typeof lp.correct === "number") ? lp.correct
                      : (typeof a.correct === "number" ? a.correct : null);
        const mine = (options && options[a.c] !== undefined) ? options[a.c] : "—";
        let verdict = "";
        if (correct !== null && options && options[correct] !== undefined) {
          scored++;
          if (a.c === correct) { right++; verdict = " <span class='right'>✓ Correct</span>"; }
          else verdict = " <span class='wrong'>✗</span> · Correct answer: " + pollEscapeHtml(options[correct]);
        }
        rows += "<div class='qa'><div class='q'>" + pollEscapeHtml(question || "(question)") + "</div>" +
                "<div class='a'>Your answer: <b>" + pollEscapeHtml(mine) + "</b>" + verdict + "</div></div>";
      }
      const score = scored ? right + " / " + scored + " correct" : "no scored questions";
      // session title: live name from the database, else the name saved with a
      // vote, else just the session code
      const savedName = [...list].reverse().map(a => a.n).find(n => typeof n === "string" && n.trim());
      const name = (typeof liveName === "string" && liveName.trim()) ? liveName.trim()
                 : (savedName ? savedName.trim() : null);
      const when = Math.max(...list.map(a => a.t || 0));
      const date = when ? new Date(when).toLocaleDateString(undefined,
        { year: "numeric", month: "short", day: "numeric" }) : "";
      html += "<div class='sessionCard'>" +
              (name ? "<h2>" + pollEscapeHtml(name) + "</h2>" : "") +
              "<div class='code'>session " + pollEscapeHtml(code) + (date ? " · " + date : "") + "</div>" +
              "<div class='score'>" + list.length + " question" + (list.length === 1 ? "" : "s") +
              " answered · " + score + "</div>" + rows + "</div>";
    }
    if (remoteFailed) {
      html += "<div id='empty'>Showing answers saved on this device only — couldn't reach the database to sync your full history.</div>";
    }
    $("content").innerHTML = html;
  }

  if (!pollSupabaseReady()) {
    $("who").textContent = "This page isn't set up yet (Supabase config missing).";
  } else {
    sb.auth.onAuthStateChange((_event, session) => {
      user = session ? session.user : null;
      if (user) {
        $("login").style.display = "none";
        $("who").innerHTML = pollEscapeHtml(user.email) +
          ' · <a href="#" onclick="sb.auth.signOut();return false;">sign out</a>';
        load().catch((e) => {
          $("content").innerHTML = "<div id='empty'>Something went wrong loading your results: " +
            pollEscapeHtml((e && (e.code || e.message)) || e) + "</div>";
        });
      } else {
        $("login").style.display = "block";
        $("who").textContent = "Sign in to see the questions you've answered.";
        $("content").innerHTML = "";
      }
    });
  }
</script>
</body>
</html>
