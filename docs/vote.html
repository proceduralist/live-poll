<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Live Poll — Vote</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="poll-common.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg, #0f172a); color: var(--text, #f1f5f9); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 24px 16px;
  }
  .badge { font-size: 12px; letter-spacing: 2px; color: var(--muted, #94a3b8); text-transform: uppercase; }
  #session { color: var(--accent, #38bdf8); font-weight: 700; }
  #sessName { font-size: 16px; font-weight: 700; margin-top: 6px; text-align: center; display: none; }
  .acct { font-size: 13px; color: var(--muted, #94a3b8); margin-top: 8px; text-align: center; }
  .acct a { color: var(--accent, #38bdf8); text-decoration: none; }
  #acctPanel { width: 100%; max-width: 480px; background: var(--panel, #1e293b);
    border-radius: 12px; padding: 14px; margin-top: 14px; }
  #acctPanel input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px;
    border: 1px solid var(--muted, #334155); background: var(--bg, #0f172a);
    color: var(--text, #f1f5f9); font-size: 15px; }
  #acctPanel button { padding: 9px 14px; margin: 0 8px 4px 0; border: none; border-radius: 8px;
    background: var(--accent, #0284c7); color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
  #acctPanel button.gray { background: #475569; }
  #acctMsg { font-size: 13px; color: #f87171; margin-top: 4px; min-height: 18px; }
  h1 { font-size: 22px; margin: 18px 0 24px; text-align: center; line-height: 1.35; max-width: 480px; }
  .options { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }
  button.opt {
    width: 100%; padding: 16px; font-size: 17px; font-weight: 600; text-align: left;
    color: var(--text, #f1f5f9); background: var(--panel, #1e293b);
    border: 2px solid var(--panel, #334155); border-radius: 12px;
    cursor: pointer; transition: all .15s;
  }
  button.opt:active { transform: scale(.98); }
  button.opt.selected { border-color: var(--accent, #38bdf8); }
  button.opt:disabled { opacity: .55; cursor: default; }
  button.opt.selected:disabled, button.opt.correct:disabled, button.opt.wrong:disabled { opacity: 1; }
  button.opt.correct { border-color: #4ade80; }
  button.opt.wrong { border-color: #f87171; }
  button.submit {
    width: 100%; max-width: 480px; margin-top: 16px; padding: 16px; font-size: 17px;
    font-weight: 700; border: none; border-radius: 12px; cursor: pointer;
    background: var(--accent, #0284c7); color: white; transition: all .15s;
  }
  button.submit:active { transform: scale(.98); }
  button.submit:disabled { opacity: .45; cursor: default; }
  #status { margin-top: 24px; font-size: 15px; color: var(--muted, #94a3b8); text-align: center; min-height: 22px; }
  #status.ok { color: #4ade80; }
  #status.err { color: #f87171; }
  .waiting { margin-top: 40px; text-align: center; color: var(--muted, #94a3b8); font-size: 16px; line-height: 1.6;
    max-width: 420px; }
  .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--accent, #38bdf8);
    margin-right: 8px; animation: pulse 1.2s infinite ease-in-out; }
  @keyframes pulse { 0%,100% { opacity: .3 } 50% { opacity: 1 } }
</style>
</head>
<body>
  <div class="badge">Live poll &nbsp;·&nbsp; session <span id="session">—</span></div>
  <div id="sessName"></div>
  <div class="acct" id="acctBar"></div>
  <div id="acctPanel" style="display:none">
    <input id="aEmail" type="email" placeholder="email" autocomplete="username" />
    <input id="aPass" type="password" placeholder="password (6+ characters)" autocomplete="current-password" />
    <div>
      <button onclick="acctSignIn()">Sign in</button>
      <button onclick="acctCreate()">Create account</button>
      <button class="gray" onclick="hideAcct()">Cancel</button>
    </div>
    <div id="acctMsg"></div>
  </div>
  <div id="app"></div>
  <div id="status"></div>

<script>
  const $ = (id) => document.getElementById(id);
  const sessionCode = pollCleanCode(new URLSearchParams(location.search).get("s"));
  $("session").textContent = sessionCode || "?";
  const deviceId = pollDeviceId();

  let user = null;
  let sessionName = null; // presenter-chosen title, e.g. the talk's name
  let activeId = null, poll = null, myVote = null; // myVote = {c, v} from Firebase
  let pending = null, pendingFor = null; // locally selected (unsubmitted) choice
  let db = null, pollRef = null, voteRef = null;

  // Signed-in voters vote under their account (progress follows them across
  // devices); guests vote under a random per-device id. One vote either way.
  function voteKey() { return user ? "u" + user.uid : deviceId; }

  // ---------- optional account ----------
  function renderAcct() {
    $("acctBar").innerHTML = user
      ? "Signed in as " + pollEscapeHtml(user.email) +
        ' · <a href="review.html">My results</a> · <a href="#" onclick="firebase.auth().signOut();return false;">sign out</a>'
      : '<a href="#" onclick="showAcct();return false;">Sign in</a> to track your answers — or just vote as a guest';
  }
  function showAcct() { $("acctPanel").style.display = "block"; }
  function hideAcct() { $("acctPanel").style.display = "none"; $("acctMsg").textContent = ""; }
  function acctSignIn() {
    firebase.auth().signInWithEmailAndPassword($("aEmail").value.trim(), $("aPass").value)
      .then(hideAcct).catch((e) => { $("acctMsg").textContent = "Sign-in failed: " + e.code; });
  }
  function acctCreate() {
    firebase.auth().createUserWithEmailAndPassword($("aEmail").value.trim(), $("aPass").value)
      .then(hideAcct).catch((e) => { $("acctMsg").textContent = "Couldn't create account: " + e.code; });
  }

  // ---------- voting ----------
  function setStatus(msg, cls) { $("status").textContent = msg || ""; $("status").className = cls || ""; }
  function renderWaiting(msg) {
    $("app").innerHTML = '<div class="waiting"><span class="pulse"></span>' + msg + "</div>";
    setStatus("");
  }

  function render() {
    if (!activeId || !poll) {
      renderWaiting("Waiting for the presenter to show a question…");
      return;
    }
    // discard any unsubmitted selection from a previous question/round
    const roundKey = activeId + "_" + poll.version;
    if (pendingFor !== roundKey) { pending = null; pendingFor = roundKey; }

    const votedThisRound = myVote && myVote.v === poll.version;
    const reveal = !poll.open && typeof poll.correct === "number"; // voting closed on a quiz question
    const canVote = poll.open && !votedThisRound;
    let html = "<h1>" + pollEscapeHtml(poll.question) + "</h1><div class='options'>";
    (poll.options || []).forEach((opt, i) => {
      let cls = "opt";
      if (reveal && i === poll.correct) cls += " correct";
      else if (reveal && votedThisRound && myVote.c === i) cls += " wrong";
      else if (votedThisRound && myVote.c === i) cls += " selected";
      else if (canVote && pending === i) cls += " selected";
      const dis = canVote ? "" : " disabled";
      html += "<button class='" + cls + "'" + dis + " onclick='selectOpt(" + i + ")'>" +
              pollEscapeHtml(opt) + "</button>";
    });
    html += "</div>";
    if (canVote) {
      html += "<button class='submit'" + (pending === null ? " disabled" : "") +
              " onclick='submitVote()'>Submit answer</button>";
    }
    $("app").innerHTML = html;

    if (reveal && votedThisRound) {
      myVote.c === poll.correct
        ? setStatus("✓ Correct!", "ok")
        : setStatus("✗ Correct answer: " + poll.options[poll.correct], "err");
    }
    else if (votedThisRound) setStatus("✓ Vote recorded — watch the screen!", "ok");
    else if (!poll.open) setStatus("Voting is closed for this question.", "err");
    else if (pending !== null) setStatus("Tap Submit to save your answer");
    else setStatus("Tap an answer, then Submit");
  }

  function selectOpt(choice) {
    if (!poll || !poll.open || (myVote && myVote.v === poll.version)) return;
    pending = choice;
    render();
  }

  function submitVote() {
    if (pending === null) return;
    vote(pending);
  }

  function vote(choice) {
    if (!poll || !poll.open || (myVote && myVote.v === poll.version)) return;
    db.ref("sessions/" + sessionCode + "/votes/" + activeId + "/" + voteKey())
      .set({ c: choice, v: poll.version })
      .catch(() => setStatus("Connection problem — try again.", "err"));
    // signed-in voters keep a private answer history for the review page
    if (user) {
      const key = sessionCode + "_" + activeId;
      const rec = {
        s: sessionCode, p: activeId, c: choice, v: poll.version,
        question: poll.question, options: poll.options,
        correct: typeof poll.correct === "number" ? poll.correct : null,
        n: sessionName || null, // session name at vote time (review page fallback)
        t: Date.now()
      };
      // mirror locally so review.html works even if the users/ rules aren't published
      try {
        const k = "pollAnswers_" + user.uid;
        const all = JSON.parse(localStorage.getItem(k)) || {};
        all[key] = rec;
        localStorage.setItem(k, JSON.stringify(all));
      } catch (e) {}
      db.ref("users/" + user.uid + "/answers/" + key).set(rec).catch(() => {});
    }
  }

  function attachVoteRef() {
    if (voteRef) { voteRef.off(); voteRef = null; }
    myVote = null;
    if (!activeId) return;
    voteRef = db.ref("sessions/" + sessionCode + "/votes/" + activeId + "/" + voteKey());
    voteRef.on("value", (s) => { myVote = s.val(); render(); });
  }

  // ---------- live listeners ----------
  if (!sessionCode) {
    renderWaiting("Missing session code — scan the QR code on the presentation screen.");
  } else if (!pollFirebaseReady()) {
    renderWaiting("This poll isn't set up yet (Firebase config missing).");
  } else {
    db = firebase.database();
    firebase.auth().onAuthStateChanged((u) => { user = u; renderAcct(); attachVoteRef(); });
    renderAcct();

    // match the presentation's color theme
    db.ref("sessions/" + sessionCode + "/theme").on("value", (s) => pollApplyTheme(s.val()));

    // session name set by the presenter (e.g. the talk's title)
    db.ref("sessions/" + sessionCode + "/name").on("value", (s) => {
      sessionName = (typeof s.val() === "string" && s.val().trim()) ? s.val().trim() : null;
      const el = $("sessName");
      el.textContent = sessionName || "";
      el.style.display = sessionName ? "block" : "none";
    });

    db.ref("sessions/" + sessionCode + "/active").on("value", (snap) => {
      const id = snap.val();
      if (id === activeId) return;
      activeId = id; poll = null;
      if (pollRef) pollRef.off();
      if (!activeId) { attachVoteRef(); render(); return; }
      pollRef = db.ref("sessions/" + sessionCode + "/polls/" + activeId);
      pollRef.on("value", (s) => { poll = s.val(); render(); });
      attachVoteRef();
    });
    renderWaiting("Connecting…");
  }
</script>
</body>
</html>
