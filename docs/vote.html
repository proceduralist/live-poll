<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Live Poll — Vote</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="poll-common.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg, #0f172a); color: var(--text, #f1f5f9); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 24px 16px;
  }
  .badge { font-size: 12px; letter-spacing: 2px; color: var(--muted, #94a3b8); text-transform: uppercase; }
  #session { color: var(--accent, #38bdf8); font-weight: 700; }
  #sessName { font-size: 16px; font-weight: 700; margin-top: 6px; text-align: center; display: none; }
  .acct { font-size: 13px; color: var(--muted, #94a3b8); margin-top: 8px; text-align: center; }
  .acct a { color: var(--accent, #38bdf8); text-decoration: none; }
  #acctPanel { width: 100%; max-width: 480px; background: var(--panel, #1e293b);
    border-radius: 12px; padding: 14px; margin-top: 14px; }
  #acctPanel input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px;
    border: 1px solid var(--muted, #334155); background: var(--bg, #0f172a);
    color: var(--text, #f1f5f9); font-size: 15px; }
  #acctPanel button { padding: 9px 14px; margin: 0 8px 4px 0; border: none; border-radius: 8px;
    background: var(--accent, #0284c7); color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
  #acctPanel button.gray { background: #475569; }
  #acctMsg { font-size: 13px; color: #f87171; margin-top: 4px; min-height: 18px; }
  h1 { font-size: 22px; margin: 18px 0 24px; text-align: center; line-height: 1.35; max-width: 480px; }
  .options { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }
  button.opt {
    width: 100%; padding: 16px; font-size: 17px; font-weight: 600; text-align: left;
    color: var(--text, #f1f5f9); background: var(--panel, #1e293b);
    border: 2px solid var(--panel, #334155); border-radius: 12px;
    cursor: pointer; transition: all .15s;
  }
  button.opt:active { transform: scale(.98); }
  button.opt.selected { border-color: var(--accent, #38bdf8); }
  button.opt:disabled { opacity: .55; cursor: default; }
  button.opt.selected:disabled, button.opt.correct:disabled, button.opt.wrong:disabled { opacity: 1; }
  button.opt.correct { border-color: #4ade80; }
  button.opt.wrong { border-color: #f87171; }
  button.submit {
    width: 100%; max-width: 480px; margin-top: 16px; padding: 16px; font-size: 17px;
    font-weight: 700; border: none; border-radius: 12px; cursor: pointer;
    background: var(--accent, #0284c7); color: white; transition: all .15s;
  }
  button.submit:active { transform: scale(.98); }
  button.submit:disabled { opacity: .45; cursor: default; }
  #status { margin-top: 24px; font-size: 15px; color: var(--muted, #94a3b8); text-align: center; min-height: 22px; }
  #status.ok { color: #4ade80; }
  #status.err { color: #f87171; }
  .waiting { margin-top: 40px; text-align: center; color: var(--muted, #94a3b8); font-size: 16px; line-height: 1.6;
    max-width: 420px; }
  .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--accent, #38bdf8);
    margin-right: 8px; animation: pulse 1.2s infinite ease-in-out; }
  @keyframes pulse { 0%,100% { opacity: .3 } 50% { opacity: 1 } }
</style>
</head>
<body>
  <div class="badge">Live poll &nbsp;·&nbsp; session <span id="session">—</span></div>
  <div id="sessName"></div>
  <div class="acct" id="acctBar"></div>
  <div id="acctPanel" style="display:none">
    <input id="aEmail" type="email" placeholder="email" autocomplete="username" />
    <input id="aPass" type="password" placeholder="password (6+ characters)" autocomplete="current-password" />
    <div>
      <button onclick="acctSignIn()">Sign in</button>
      <button onclick="acctCreate()">Create account</button>
      <button class="gray" onclick="hideAcct()">Cancel</button>
    </div>
    <div id="acctMsg"></div>
  </div>
  <div id="app"></div>
  <div id="status"></div>

<script>
  const $ = (id) => document.getElementById(id);
  const sessionCode = pollCleanCode(new URLSearchParams(location.search).get("s"));
  $("session").textContent = sessionCode || "?";
  const deviceId = pollDeviceId();

  let user = null;
  let sessionName = null;              // presenter-chosen title, e.g. the talk's name
  let activeId = null;                 // slide currently on screen
  let pending = null, pendingFor = null; // locally selected (unsubmitted) choice
  let sessWatch = null, pollsWatch = null;

  // Signed-in voters vote under their account (progress follows them across
  // devices); guests vote under a random per-device id. One vote either way.
  function voteKey() { return user ? "u" + user.id : deviceId; }
  function poll() { return (pollsWatch && activeId) ? pollsWatch.polls[activeId] : null; }

  // ---------- optional account ----------
  function renderAcct() {
    $("acctBar").innerHTML = user
      ? "Signed in as " + pollEscapeHtml(user.email) +
        ' · <a href="review.html">My results</a> · <a href="#" onclick="sb.auth.signOut();return false;">sign out</a>'
      : '<a href="#" onclick="showAcct();return false;">Sign in</a> to track your answers — or just vote as a guest';
  }
  function showAcct() { $("acctPanel").style.display = "block"; }
  function hideAcct() { $("acctPanel").style.display = "none"; $("acctMsg").textContent = ""; }
  async function acctSignIn() {
    $("acctMsg").style.color = "#f87171";
    const { error } = await sb.auth.signInWithPassword(
      { email: $("aEmail").value.trim(), password: $("aPass").value });
    if (error) $("acctMsg").textContent = "Sign-in failed: " + error.message;
    else hideAcct();
  }
  async function acctCreate() {
    $("acctMsg").style.color = "#f87171";
    const { data, error } = await sb.auth.signUp(
      { email: $("aEmail").value.trim(), password: $("aPass").value });
    if (error) { $("acctMsg").textContent = "Couldn't create account: " + error.message; return; }
    if (!data.session) {
      // email confirmation is turned on for this Supabase project
      $("acctMsg").style.color = "#4ade80";
      $("acctMsg").textContent = "Almost there — tap the link in the email we just sent, then sign in.";
      return;
    }
    hideAcct();
  }

  // ---------- my votes (live, per session) ----------
  // One tiny Realtime subscription filtered to MY voter key — receives only my
  // own rows, so a 300-person audience doesn't stream everyone's votes here.
  let myWatch = null, myVotes = {}; // slide_id -> {choice, version}
  let myWatchKey = null;
  function attachVoteWatch() {
    const key = voteKey();
    if (myWatch && key === myWatchKey) return;
    if (myWatch) { myWatch.off(); myWatch = null; }
    myWatchKey = key;
    myVotes = {};
    let dead = false;
    const chan = sb.channel(pollChanName("myvotes", sessionCode))
      .on("postgres_changes",
        { event: "*", schema: "public", table: "votes", filter: "voter_key=eq." + key },
        (msg) => {
          const r = msg.eventType === "DELETE" ? msg.old : msg.new;
          if (!r || r.session_code !== sessionCode || r.voter_key !== key) return;
          if (msg.eventType === "DELETE") delete myVotes[r.slide_id];
          else myVotes[r.slide_id] = { choice: r.choice, version: r.version };
          render();
        })
      .subscribe((status) => {
        if (status !== "SUBSCRIBED") return;
        sb.from("votes").select("slide_id,choice,version")
          .eq("session_code", sessionCode).eq("voter_key", key)
          .then(({ data, error }) => {
            if (dead || error) return;
            myVotes = {};
            (data || []).forEach(r => { myVotes[r.slide_id] = { choice: r.choice, version: r.version }; });
            render();
          });
      });
    myWatch = { off() { dead = true; sb.removeChannel(chan); } };
  }

  // ---------- voting ----------
  function setStatus(msg, cls) { $("status").textContent = msg || ""; $("status").className = cls || ""; }
  function renderWaiting(msg) {
    $("app").innerHTML = '<div class="waiting"><span class="pulse"></span>' + msg + "</div>";
    setStatus("");
  }

  function render() {
    const p = poll();
    if (!activeId || !p) {
      renderWaiting("Waiting for the presenter to show a question…");
      return;
    }
    // discard any unsubmitted selection from a previous question/round
    const roundKey = activeId + "_" + p.version;
    if (pendingFor !== roundKey) { pending = null; pendingFor = roundKey; }

    const myVote = myVotes[activeId];
    const votedThisRound = myVote && myVote.version === p.version;
    const reveal = !p.open && typeof p.correct === "number"; // voting closed on a quiz question
    const canVote = p.open && !votedThisRound;
    let html = "<h1>" + pollEscapeHtml(p.question) + "</h1><div class='options'>";
    (p.options || []).forEach((opt, i) => {
      let cls = "opt";
      if (reveal && i === p.correct) cls += " correct";
      else if (reveal && votedThisRound && myVote.choice === i) cls += " wrong";
      else if (votedThisRound && myVote.choice === i) cls += " selected";
      else if (canVote && pending === i) cls += " selected";
      const dis = canVote ? "" : " disabled";
      html += "<button class='" + cls + "'" + dis + " onclick='selectOpt(" + i + ")'>" +
              pollEscapeHtml(opt) + "</button>";
    });
    html += "</div>";
    if (canVote) {
      html += "<button class='submit'" + (pending === null ? " disabled" : "") +
              " onclick='submitVote()'>Submit answer</button>";
    }
    $("app").innerHTML = html;

    if (reveal && votedThisRound) {
      myVote.choice === p.correct
        ? setStatus("✓ Correct!", "ok")
        : setStatus("✗ Correct answer: " + p.options[p.correct], "err");
    }
    else if (votedThisRound) setStatus("✓ Vote recorded — watch the screen!", "ok");
    else if (!p.open) setStatus("Voting is closed for this question.", "err");
    else if (pending !== null) setStatus("Tap Submit to save your answer");
    else setStatus("Tap an answer, then Submit");
  }

  function selectOpt(choice) {
    const p = poll();
    const myVote = myVotes[activeId];
    if (!p || !p.open || (myVote && myVote.version === p.version)) return;
    pending = choice;
    render();
  }

  function submitVote() {
    if (pending === null) return;
    vote(pending);
  }

  async function vote(choice) {
    const p = poll();
    const myVote = myVotes[activeId];
    if (!p || !p.open || (myVote && myVote.version === p.version)) return;
    const { error } = await sb.from("votes").upsert({
      session_code: sessionCode, slide_id: activeId,
      voter_key: voteKey(), choice, version: p.version
    });
    if (error) {
      setStatus(/closed/i.test(error.message || "")
        ? "Voting just closed — too late for this one."
        : "Connection problem — try again.", "err");
      return;
    }
    myVotes[activeId] = { choice, version: p.version }; // instant; Realtime echoes it too
    render();
    // signed-in voters keep a private answer history for the review page
    if (user) {
      const rec = {
        s: sessionCode, p: activeId, c: choice, v: p.version,
        question: p.question, options: p.options,
        correct: typeof p.correct === "number" ? p.correct : null,
        n: sessionName || null, // session name at vote time (review page fallback)
        t: Date.now()
      };
      // mirror locally so review.html works even while offline
      try {
        const k = "pollAnswers_" + user.id;
        const all = JSON.parse(localStorage.getItem(k)) || {};
        all[sessionCode + "_" + activeId] = rec;
        localStorage.setItem(k, JSON.stringify(all));
      } catch (e) {}
      sb.from("answers").upsert({
        user_id: user.id, session_code: sessionCode, slide_id: activeId,
        choice, version: p.version, question: p.question, options: p.options,
        correct: typeof p.correct === "number" ? p.correct : null,
        session_name: sessionName || null
      }).then(() => {});
    }
  }

  // ---------- live listeners ----------
  if (!sessionCode) {
    renderWaiting("Missing session code — scan the QR code on the presentation screen.");
  } else if (!pollSupabaseReady()) {
    renderWaiting("This poll isn't set up yet (Supabase config missing).");
  } else {
    sb.auth.onAuthStateChange((_event, session) => {
      user = session ? session.user : null;
      renderAcct();
      attachVoteWatch(); // no-op unless the voter key actually changed
    });
    renderAcct();

    // one row: presenter's session name, color theme, and the slide on screen
    sessWatch = pollWatchSession(sessionCode, (row) => {
      pollApplyTheme(row && row.theme);
      sessionName = (row && typeof row.name === "string" && row.name.trim()) ? row.name.trim() : null;
      const el = $("sessName");
      el.textContent = sessionName || "";
      el.style.display = sessionName ? "block" : "none";
      const id = row ? row.active_slide : null;
      if (id !== activeId) { activeId = id; render(); }
    });

    // this session's questions (open/close, resets, edits arrive live)
    pollsWatch = pollWatchPolls(sessionCode, () => render());

    attachVoteWatch();
    renderWaiting("Connecting…");
  }
</script>
</body>
</html>
