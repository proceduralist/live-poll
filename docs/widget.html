<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live Poll</title>
<!-- Office.js — lets this page talk to PowerPoint -->
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<!-- QR code generator (the QR is just a web URL — works on iOS and Android) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="poll-common.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg, #0f172a); color: var(--text, #f1f5f9); padding: 16px; overflow: hidden;
  }
  /* ---------- edit mode (author sets the question) ---------- */
  #editor h2 { font-size: 16px; margin-bottom: 10px; color: var(--accent, #38bdf8); }
  #editor label { display: block; font-size: 12px; color: var(--muted, #94a3b8); margin: 8px 0 4px; }
  #editor input, #editor textarea, #editor select {
    width: 100%; padding: 8px; font-size: 14px; border-radius: 8px;
    border: 1px solid var(--panel, #334155); background: var(--panel, #1e293b);
    color: var(--text, #f1f5f9);
  }
  #editor textarea { height: 90px; resize: none; }
  #editor button {
    margin-top: 12px; padding: 9px 18px; font-size: 14px; font-weight: 600;
    background: var(--accent, #0284c7); color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  #saveMsg { margin-left: 10px; font-size: 13px; color: #4ade80; }
  .meta { margin-top: 12px; font-size: 12px; color: var(--muted, #64748b); line-height: 1.6; }
  .meta b { color: var(--text, #94a3b8); }
  #themeRow { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 26px; height: 26px; border-radius: 6px; border: 2px solid transparent;
    cursor: pointer; padding: 0; margin: 0 !important; }
  .swatch.sel { border-color: var(--text, #f1f5f9); }
  #themeRow input[type=color] { width: 32px; height: 28px; padding: 0 2px; cursor: pointer; }
  /* ---------- live mode (slideshow) ---------- */
  #live { display: none; height: 100%; }
  .liveGrid { display: flex; gap: 20px; height: 100%; }
  .left { flex: 1.6; min-width: 0; display: flex; flex-direction: column; }
  .right { width: 200px; flex-shrink: 0; text-align: center; }
  #liveQuestion { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 14px; }
  .bars { flex: 1; display: flex; flex-direction: column; gap: 12px; justify-content: center;
    overflow-y: auto; }
  .barRow { display: flex; flex-direction: column; gap: 4px; }
  .barLabel { font-size: 15px; line-height: 1.3; white-space: normal; word-break: break-word; }
  .barLine { display: flex; align-items: center; gap: 10px; }
  .barTrack { flex: 1; background: var(--panel, #1e293b); border-radius: 8px; height: 26px; overflow: hidden; }
  .barFill { height: 100%; background: var(--accent, #38bdf8); border-radius: 8px;
    width: 0%; transition: width .5s ease; min-width: 2px; }
  .barCount { width: 80px; font-size: 15px; font-weight: 700; color: var(--accent, #38bdf8); flex-shrink: 0; }
  #total { font-size: 13px; color: var(--muted, #94a3b8); margin-top: 10px; }
  #totalRow { display: flex; align-items: center; gap: 14px; }
  #revealBtn { display: none; margin-top: 10px; padding: 7px 14px; font-size: 13px;
    font-weight: 600; background: transparent; color: var(--accent, #38bdf8);
    border: 1px solid var(--accent, #38bdf8); border-radius: 8px; cursor: pointer;
    flex-shrink: 0; }
  #revealBtn:hover { background: var(--panel, #1e293b); }
  #qr { background: white; padding: 10px; border-radius: 10px; display: inline-block; }
  #qr img, #qr canvas { display: block; }
  .joinText { font-size: 13px; color: var(--muted, #94a3b8); margin-top: 10px; line-height: 1.5; word-break: break-all; }
  .joinText b { color: var(--text, #f1f5f9); font-size: 14px; }
  #err { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }
</style>
</head>
<body>

<!-- ====== EDIT MODE: shown while building the deck ====== -->
<div id="editor">
  <h2>🗳️ Live Poll — question for this slide</h2>

  <!-- presenter sign-in (voters never see this — it's only in the editor) -->
  <div id="authForm" style="display:none; background:#1e293b; border:1px solid #334155;
       border-radius:8px; padding:10px; margin-bottom:10px;">
    <label>Presenter email</label>
    <input id="authEmail" type="email" autocomplete="username" />
    <label>Password</label>
    <input id="authPass" type="password" autocomplete="current-password" />
    <button onclick="signIn()">Sign in</button>
    <span id="authMsg" style="margin-left:10px; font-size:13px; color:#f87171;"></span>
  </div>
  <div id="authInfo" style="display:none; font-size:12px; color:#4ade80; margin-bottom:10px;">
    Signed in as <span id="authWho"></span>
    <a href="#" onclick="firebase.auth().signOut(); return false;"
       style="color:#94a3b8; margin-left:8px;">sign out</a>
  </div>
  <label>Session name (whole presentation — shown on voters' results page)</label>
  <input id="nameInput" maxlength="60" placeholder="e.g. Cardiology Grand Rounds — June" />
  <label>Question</label>
  <input id="qInput" placeholder="e.g. Which option would you choose?" />
  <label>Answer choices (one per line, 2–8)</label>
  <textarea id="optsInput"></textarea>
  <label>Correct answer (optional — turns this question into a quiz)</label>
  <select id="correctSel"></select>
  <label>Theme (applies to the whole presentation + voters' phones)</label>
  <div id="themeRow">
    <span style="font-size:12px; margin-left:4px;">Custom:</span>
    <input type="color" id="bgPick" title="Background color" />
    <input type="color" id="accentPick" title="Accent color" />
  </div>
  <button onclick="saveQuestion()">Save question</button><span id="saveMsg"></span>
  <div class="meta">
    Session code: <b id="metaSession">…</b> · Slide: <b id="metaSlide">…</b><br/>
    Audience link: <b id="metaUrl">…</b><br/>
    Start the slideshow and this box becomes the live results chart + QR code.
  </div>
  <div style="margin-top:14px; border-top:1px solid var(--panel,#334155); padding-top:4px;">
    <button id="resetBtn" style="background:#475569;" onclick="resetAllVotes()">🔄 New audience — reset all votes</button>
    <span id="resetMsg" style="margin-left:10px; font-size:13px;"></span>
  </div>
</div>

<!-- ====== LIVE MODE: shown during the slideshow ====== -->
<div id="live">
  <div class="liveGrid">
    <div class="left">
      <div id="liveQuestion"></div>
      <div class="bars" id="bars"></div>
      <div id="totalRow">
        <div id="total"></div>
        <button id="revealBtn" onclick="toggleOpen()"></button>
      </div>
    </div>
    <div class="right">
      <div id="qr"></div>
      <div class="joinText">Scan to vote<br/><b id="joinUrl"></b></div>
    </div>
  </div>
</div>
<div id="err"></div>

<script>
  const $ = (id) => document.getElementById(id);
  let user = null; // signed-in presenter (null = signed out)
  let sessionCode = null;
  let slideId = null;          // "slide3" — one question per slide
  let qrMade = false;
  let pollRef = null, votesWatch = null;
  let curPoll = null;

  // The voting page lives next to this page on GitHub Pages
  const voteUrl = () => new URL("vote.html", location.href).href + "?s=" + sessionCode;

  function showError(msg) { const e = $("err"); e.textContent = msg; e.style.display = "block"; }

  // ----- presenter authentication -----
  function updateAuthUI() {
    $("authForm").style.display = user ? "none" : "block";
    $("authInfo").style.display = user ? "block" : "none";
    if (user) $("authWho").textContent = user.email;
  }

  function signIn() {
    $("authMsg").textContent = "";
    firebase.auth()
      .signInWithEmailAndPassword($("authEmail").value.trim(), $("authPass").value)
      .catch((e) => { $("authMsg").textContent = "Sign-in failed: " + e.code; });
  }

  // ----- color theme (per presentation, stored in the deck + synced to voters) -----
  const PRESET_THEMES = [
    { name: "Midnight", bg: "#0f172a", accent: "#38bdf8" },
    { name: "Light",    bg: "#ffffff", accent: "#0284c7" },
    { name: "Forest",   bg: "#052e16", accent: "#4ade80" },
    { name: "Plum",     bg: "#2e1065", accent: "#a78bfa" }
  ];
  let theme = { ...PRESET_THEMES[0] };

  function setTheme(t, persist) {
    theme = { bg: t.bg, accent: t.accent };
    pollApplyTheme(theme);
    $("bgPick").value = theme.bg;
    $("accentPick").value = theme.accent;
    document.querySelectorAll(".swatch").forEach(el =>
      el.classList.toggle("sel", el.dataset.bg === theme.bg && el.dataset.accent === theme.accent));
    if (persist) {
      Office.context.document.settings.set("pollTheme", JSON.stringify(theme));
      Office.context.document.settings.saveAsync(() => {});
      pushTheme();
    }
  }

  // voters' phones read the theme from Firebase (write needs the presenter account).
  // Skips the write if the theme already matches what we last pushed — liveTick
  // calls this on every slide change, and re-writing an unchanged theme would
  // re-broadcast it to every connected phone for nothing.
  let lastPushedTheme = null;
  function pushTheme() {
    if (!user || !sessionCode) return;
    const json = JSON.stringify(theme);
    if (json === lastPushedTheme) return;
    lastPushedTheme = json;
    firebase.database().ref("sessions/" + sessionCode + "/theme").set(theme)
      .catch(() => { lastPushedTheme = null; }); // retry on next call if it failed
  }

  // ----- session name (per presentation, like the theme) — gives the session a
  // ----- memorable title on the voting page and in everyone's results history
  let sessionName = "";
  let lastPushedName = null;
  function pushName() {
    if (!user || !sessionCode || !sessionName) return;
    if (sessionName === lastPushedName) return;
    lastPushedName = sessionName;
    firebase.database().ref("sessions/" + sessionCode + "/name").set(sessionName)
      .catch(() => { lastPushedName = null; }); // retry on next call
  }

  function setSessionName(n, persist) {
    sessionName = String(n || "").trim().slice(0, 60);
    if ($("nameInput").value !== sessionName) $("nameInput").value = sessionName;
    if (persist) {
      Office.context.document.settings.set("pollSessionName", sessionName);
      Office.context.document.settings.saveAsync(() => {});
      pushName();
    }
  }

  function loadSavedName() {
    const saved = Office.context.document.settings.get("pollSessionName");
    if (saved) { setSessionName(saved, false); return; }
    // sensible default: the presentation's filename (without extension)
    const url = Office.context.document.url || "";
    let base = "";
    try { base = decodeURIComponent(url.split(/[\\/]/).pop() || ""); } catch (e) {}
    base = base.replace(/\.[^.]+$/, "");
    if (base) setSessionName(base, false);
  }

  function buildThemeRow() {
    const row = $("themeRow");
    PRESET_THEMES.slice().reverse().forEach((t) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "swatch";
      b.title = t.name;
      b.dataset.bg = t.bg; b.dataset.accent = t.accent;
      b.style.background = "linear-gradient(135deg," + t.bg + " 55%," + t.accent + " 45%)";
      b.onclick = () => setTheme(t, true);
      row.insertBefore(b, row.firstChild);
    });
    const onPick = () => setTheme({ bg: $("bgPick").value, accent: $("accentPick").value }, true);
    $("bgPick").onchange = onPick;
    $("accentPick").onchange = onPick;
  }

  function loadSavedTheme() {
    const raw = Office.context.document.settings.get("pollTheme");
    if (raw) { try { setTheme(JSON.parse(raw), false); return; } catch (e) {} }
    setTheme(PRESET_THEMES[0], false);
  }

  // Mark this session as owned by the signed-in presenter (first writer wins;
  // database rules reject anyone else afterwards)
  let ownerOk = false; // cached after first success — skips a round-trip per slide
  async function claimOwner() {
    if (ownerOk) return true;
    if (!user) return false;
    const ref = firebase.database().ref("sessions/" + sessionCode + "/owner");
    const cur = (await ref.once("value")).val();
    if (cur === user.uid) { ownerOk = true; return true; }
    if (cur) { showError("This session belongs to a different presenter account."); return false; }
    try { await ref.set(user.uid); ownerOk = true; return true; }
    catch (e) { showError("Couldn't claim this session — check your sign-in."); return false; }
  }

  // ----- session code: derived from the presentation file's location, so EVERY
  // ----- widget in the same deck computes the same code (content add-ins can't
  // ----- share stored settings — each instance has its own private store).
  const CODE_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 32 chars, no confusing 0/O/1/I

  async function getSessionCode() {
    const docUrl = (Office.context.document.url || "").trim();
    if (docUrl) {
      const bytes = new Uint8Array(await crypto.subtle.digest(
        "SHA-256", new TextEncoder().encode("live-poll:" + docUrl)));
      let code = "";
      for (let i = 0; i < 8; i++) code += CODE_CHARS[bytes[i] % 32];
      return code;
    }
    // Unsaved presentation: no shared identity yet — use a per-widget code and warn.
    showError("Save your presentation (⌘S), then reopen it — until then each slide gets its own session code.");
    const saved = Office.context.document.settings.get("pollSession");
    if (saved) return saved;
    let code = "";
    for (let i = 0; i < 8; i++) code += CODE_CHARS[Math.floor(Math.random() * 32)];
    Office.context.document.settings.set("pollSession", code);
    Office.context.document.settings.saveAsync(() => {});
    return code;
  }

  // ----- the slide currently selected (edit) / displayed (slideshow).
  // ----- Uses the slide's permanent id, NOT its position: ids are identical in
  // ----- edit and slideshow mode, and survive reordering slides.
  function getSlideId() {
    return new Promise((resolve) => {
      Office.context.document.getSelectedDataAsync(Office.CoercionType.SlideRange, (res) => {
        if (res.status === Office.AsyncResultStatus.Succeeded &&
            res.value && res.value.slides && res.value.slides.length) {
          const s = res.value.slides[0];
          resolve(s.id != null ? "s" + s.id : "slide" + s.index);
        } else resolve(null);
      });
    });
  }

  function getSavedQuestion() {
    const raw = Office.context.document.settings.get("poll_" + slideId);
    if (raw) { try { return JSON.parse(raw); } catch (e) {} }
    return null;
  }

  // keep the "correct answer" dropdown in sync with the answer choices
  function refreshCorrectSel(selectIdx) {
    const opts = $("optsInput").value.split("\n").map(s => s.trim()).filter(Boolean).slice(0, 8);
    const sel = $("correctSel");
    const cur = (selectIdx !== undefined) ? selectIdx : parseInt(sel.value, 10);
    sel.innerHTML = "<option value='-1'>No correct answer — just a poll</option>" +
      opts.map((o, i) => "<option value='" + i + "'>" + pollEscapeHtml(o) + "</option>").join("");
    sel.value = String(cur >= 0 && cur < opts.length ? cur : -1);
  }

  // ----- write this slide's question to Firebase.
  // ----- If the text changed, bump the version and clear old votes.
  // pollCache remembers what's already uploaded per slide, so revisiting a
  // slide during the show doesn't re-read the poll from Firebase every time.
  const pollCache = {};
  async function uploadQuestion(q) {
    if (!q) return;
    const sid = slideId;
    const ref = firebase.database().ref("sessions/" + sessionCode + "/polls/" + sid);
    let old = pollCache[sid];
    if (old === undefined) old = (await ref.once("value")).val();
    const oldCorrect = (old && typeof old.correct === "number") ? old.correct : -1;
    const newCorrect = (typeof q.correct === "number") ? q.correct : -1;
    if (old && old.question === q.question && oldCorrect === newCorrect &&
        JSON.stringify(old.options) === JSON.stringify(q.options)) {
      pollCache[sid] = old;
      return; // unchanged
    }
    const version = (old && old.version ? old.version : 0) + 1;
    const payload = { question: q.question, options: q.options, open: true, version };
    if (newCorrect >= 0) payload.correct = newCorrect;
    await ref.set(payload);
    pollCache[sid] = payload;
    await firebase.database().ref("sessions/" + sessionCode + "/votes/" + sid).remove();
  }

  // ----- "New audience": fresh start for the whole session before re-presenting.
  // Bumps every question's version (old votes no longer count, everyone may
  // vote again), reopens voting (un-reveals quiz answers), and deletes the old
  // vote records. Questions themselves are untouched. Two clicks to confirm —
  // confirm() dialogs aren't reliable inside the Office webview.
  const RESET_LABEL = "🔄 New audience — reset all votes";
  let resetArmed = null;
  async function resetAllVotes() {
    const btn = $("resetBtn"), msg = $("resetMsg");
    msg.style.color = "#f87171";
    if (!user) { msg.textContent = "Sign in above first."; return; }
    if (!(await claimOwner())) return;
    if (!resetArmed) {
      btn.textContent = "Really reset? Click again";
      resetArmed = setTimeout(() => { resetArmed = null; btn.textContent = RESET_LABEL; }, 5000);
      return;
    }
    clearTimeout(resetArmed); resetArmed = null;
    btn.textContent = RESET_LABEL;
    try {
      const polls = (await firebase.database()
        .ref("sessions/" + sessionCode + "/polls").once("value")).val() || {};
      const updates = {};
      for (const id of Object.keys(polls)) {
        updates["polls/" + id + "/version"] = (polls[id].version || 0) + 1;
        updates["polls/" + id + "/open"] = true;
        updates["votes/" + id] = null;
      }
      await firebase.database().ref("sessions/" + sessionCode).update(updates);
      for (const id of Object.keys(polls)) delete pollCache[id]; // re-read fresh next show
      msg.style.color = "#4ade80";
      msg.textContent = "Reset ✓ — counts are back to 0";
    } catch (e) {
      msg.textContent = "Reset failed — check your connection.";
    }
    setTimeout(() => { msg.textContent = ""; }, 4000);
  }

  // =========================================================================
  // EDIT MODE
  // =========================================================================
  function initEditor() {
    $("editor").style.display = "block";
    $("live").style.display = "none";
    $("metaSession").textContent = sessionCode;
    $("metaSlide").textContent = slideId || "unknown";
    $("metaUrl").textContent = voteUrl().replace("https://", "");
    const saved = getSavedQuestion();
    if (saved) {
      $("qInput").value = saved.question;
      $("optsInput").value = saved.options.join("\n");
    } else if (!$("optsInput").value) {
      $("optsInput").value = "Option A\nOption B\nOption C";
    }
    refreshCorrectSel(saved && typeof saved.correct === "number" ? saved.correct : -1);
  }

  async function saveQuestion() {
    const question = $("qInput").value.trim();
    const options = $("optsInput").value.split("\n").map(s => s.trim()).filter(Boolean).slice(0, 8);
    if (!question || options.length < 2) {
      $("saveMsg").style.color = "#f87171";
      $("saveMsg").textContent = "Need a question and at least 2 choices.";
      return;
    }
    if (!user) {
      $("saveMsg").style.color = "#f87171";
      $("saveMsg").textContent = "Sign in above first.";
      return;
    }
    if (!(await claimOwner())) return;
    const q = { question, options };
    const correct = parseInt($("correctSel").value, 10);
    if (correct >= 0 && correct < options.length) q.correct = correct;
    // saved in the .pptx file itself, so the deck is self-contained
    Office.context.document.settings.set("poll_" + slideId, JSON.stringify(q));
    Office.context.document.settings.saveAsync(() => {});
    pushName(); // in case the name was typed before signing in
    try {
      await uploadQuestion(q);
      $("saveMsg").style.color = "#4ade80";
      $("saveMsg").textContent = "Saved ✓";
    } catch (e) {
      $("saveMsg").style.color = "#f87171";
      $("saveMsg").textContent = "Saved in file, but couldn't reach Firebase.";
    }
    setTimeout(() => { $("saveMsg").textContent = ""; }, 3000);
  }

  // =========================================================================
  // LIVE MODE (slideshow)
  //
  // During a slideshow a widget can't reliably learn which slide it sits on —
  // PowerPoint only reports which slide is DISPLAYED. So in live mode every
  // widget simply follows the displayed slide: it shows that slide's question
  // and makes it the active one. A widget is only visible when its own slide
  // is on screen, so what the audience sees is always right.
  // =========================================================================
  let liveTimer = null, liveSlideId = null, latestVotes = null;

  async function initLive() {
    $("editor").style.display = "none";
    $("live").style.display = "block";

    // QR code — plain URL, any phone camera opens it in the browser.
    // Show the link text first so it's there even if the QR library fails.
    if (!qrMade) {
      qrMade = true;
      $("joinUrl").textContent = voteUrl().replace("https://", "");
      try {
        new QRCode($("qr"), { text: voteUrl(), width: 170, height: 170,
                              correctLevel: QRCode.CorrectLevel.M });
      } catch (e) { $("qr").style.display = "none"; } // no QR — link still shown
    }

    if (liveTimer) clearInterval(liveTimer);
    liveSlideId = null;
    await liveTick();
    liveTimer = setInterval(liveTick, 400); // follow the presenter through the deck
  }

  function stopLive() {
    if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
    liveSlideId = null;
    // stop streaming results while back in edit mode — saves free-tier bandwidth
    if (pollRef) { pollRef.off(); pollRef = null; }
    if (votesWatch) { votesWatch.off(); votesWatch = null; }
    curPoll = null; latestVotes = null;
  }

  async function liveTick() {
    const cur = await getSlideId();          // the slide being DISPLAYED right now
    if (!cur || cur === liveSlideId) return; // nothing changed
    liveSlideId = cur;
    slideId = cur;
    curPoll = null; latestVotes = null;

    // if this slide has a saved question, put it on the air FIRST,
    // then sync details (question text, theme) in parallel — not before
    const q = getSavedQuestion();
    try {
      if (q && user && (await claimOwner())) {
        firebase.database().ref("sessions/" + sessionCode + "/active").set(cur)
          .catch(() => showError("Can't reach Firebase — check your internet connection."));
        uploadQuestion(q).catch(() => {});
        pushTheme();
        pushName();
      } else if (q && !user) {
        showError("Not signed in — exit the slideshow, sign in in the editor, then present again.");
      }
    } catch (e) { showError("Can't reach Firebase — check your internet connection."); }

    // follow this slide's results
    if (pollRef) pollRef.off();
    if (votesWatch) votesWatch.off();
    pollRef = firebase.database().ref("sessions/" + sessionCode + "/polls/" + cur);
    pollRef.on("value", (s) => {
      curPoll = s.val();
      if (curPoll) pollCache[cur] = curPoll; // already downloaded — keep cache fresh
      if (!curPoll && !q) $("liveQuestion").textContent = "No question saved for this slide.";
      else if (curPoll) renderResults(latestVotes);
    });
    // incremental: downloads only each new vote, not the whole list every time
    votesWatch = pollWatchVotes(
      firebase.database().ref("sessions/" + sessionCode + "/votes/" + cur),
      (votes) => { latestVotes = votes; renderResults(latestVotes); });
  }

  // Presenter clicks the button on the slide itself — content add-ins stay
  // clickable during a slideshow. Closing voting reveals the correct answer
  // (here and on every phone); a second click reopens voting and hides it.
  function toggleOpen() {
    if (!curPoll || !liveSlideId) return;
    firebase.database()
      .ref("sessions/" + sessionCode + "/polls/" + liveSlideId + "/open")
      .set(!curPoll.open)   // pollRef.on("value") re-renders everything
      .catch(() => showError("Couldn't update voting — check your connection."));
  }

  function renderResults(votesNode) {
    if (!curPoll) return; // poll data not in yet — re-called when it arrives
    const { counts, total } = pollCountVotes(votesNode, curPoll);
    $("liveQuestion").textContent = curPoll.question;
    const max = Math.max(1, ...counts);
    // reveal the correct answer on screen once voting is closed
    const reveal = !curPoll.open && typeof curPoll.correct === "number";
    $("bars").innerHTML = curPoll.options.map((opt, i) => {
      const pct = total ? Math.round(100 * counts[i] / total) : 0;
      const mark = (reveal && i === curPoll.correct)
        ? "<span style='color:#4ade80'>✓ </span>" : "";
      return "<div class='barRow'>" +
        "<div class='barLabel'>" + mark + pollEscapeHtml(opt) + "</div>" +
        "<div class='barLine'>" +
          "<div class='barTrack'><div class='barFill' style='width:" +
            (counts[i] / max * 100) + "%'></div></div>" +
          "<div class='barCount'>" + counts[i] + " · " + pct + "%</div>" +
        "</div></div>";
    }).join("");
    $("total").textContent = total + " vote" + (total === 1 ? "" : "s") +
      (curPoll.open ? "" : " · voting closed");
    // quiz question -> "Reveal answer"; plain poll -> "Close voting"
    const btn = $("revealBtn");
    const isQuiz = typeof curPoll.correct === "number";
    btn.style.display = "inline-block";
    btn.textContent = curPoll.open
      ? (isQuiz ? "Reveal answer" : "Close voting")
      : "Reopen voting";
  }

  // =========================================================================
  // Startup: pick edit vs live mode, and switch when the slideshow starts
  // =========================================================================
  function applyView(view) {
    if (view === "read") { initLive(); }
    else { stopLive(); initEditor(); }
  }

  Office.onReady(async (info) => {
    if (info.host !== Office.HostType.PowerPoint) {
      showError("This page is meant to run inside PowerPoint.");
      return;
    }
    if (!pollFirebaseReady()) {
      showError("Firebase isn't configured yet — paste your config into firebase-config.js (README step 1).");
      return;
    }
    // pushName: the session name must reach Firebase even if the presenter
    // never edits the field (the filename default) and never starts a show
    firebase.auth().onAuthStateChanged((u) => { user = u; updateAuthUI(); pushName(); });
    sessionCode = await getSessionCode();
    slideId = (await getSlideId()) || "slide0";
    buildThemeRow();
    loadSavedTheme();
    loadSavedName();
    $("nameInput").addEventListener("change", () => setSessionName($("nameInput").value, true));
    $("optsInput").addEventListener("input", () => refreshCorrectSel());
    // like the theme, the name is shared across all widgets via Firebase
    firebase.database().ref("sessions/" + sessionCode + "/name")
      .on("value", (s) => {
        const n = s.val();
        if (typeof n === "string" && n) { lastPushedName = n; setSessionName(n, false); }
        else pushName(); // nothing in Firebase yet — publish ours (skips if signed out)
      });
    // all widgets in the deck follow the session theme (settings aren't shared
    // between widget instances, but Firebase is)
    firebase.database().ref("sessions/" + sessionCode + "/theme")
      .on("value", (s) => {
        const t = s.val();
        if (!t) return;
        // remember what's already in Firebase so pushTheme can skip no-op writes
        lastPushedTheme = JSON.stringify({ bg: t.bg, accent: t.accent });
        setTheme(t, false);
      });

    // edit view = author mode, read view = slideshow mode
    Office.context.document.getActiveViewAsync((res) => {
      applyView(res.status === Office.AsyncResultStatus.Succeeded ? res.value : "edit");
    });
    Office.context.document.addHandlerAsync(
      Office.EventType.ActiveViewChanged,
      async (args) => {
        slideId = (await getSlideId()) || slideId; // re-check slide when view flips
        if (args.activeView !== "read") {
          // slideshow ended — take the question off the air (phones show "waiting")
          firebase.database().ref("sessions/" + sessionCode + "/active").set(null).catch(() => {});
        }
        applyView(args.activeView);
      }
    );
  });
</script>
</body>
</html>
